services:
  motion:
    image: mesbahul/ds-motion:latest
    volumes:
      - shared_data:/app/shared
      - ./logs:/app/logs
      - /etc/hostname:/host_hostname:ro
    networks:
      - eyes_edge_net
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 5557)); s.close()"]
    #   interval: 10s
    #   timeout: 3s
    #   retries: 5
    #   start_period: 15s
    deploy:
      labels:
        - com.ds.stack=ds_2026
        - com.ds.service=motion
      restart_policy:
        condition: any

  detection_coco:
    image: mesbahul/ds-detection-coco:latest
    volumes:
      - shared_data:/app/shared
      - ./logs:/app/logs
      - /etc/hostname:/host_hostname:ro
    networks:
      - eyes_edge_net
    # depends_on:
      # motion:
        # condition: service_healthy
    deploy:
      labels:
        - com.ds.stack=ds_2026
        - com.ds.service=detection_coco
      restart_policy:
        condition: any

  detection_fire:
    image: mesbahul/ds-detection-fire:latest
    volumes:
      - shared_data:/app/shared
      - ./logs:/app/logs
      - /etc/hostname:/host_hostname:ro
    networks:
      - eyes_edge_net
    # depends_on:
      # motion:
        # condition: service_healthy
    deploy:
      labels:
        - com.ds.stack=ds_2026
        - com.ds.service=detection_fire
      restart_policy:
        condition: any

  alert:
    image: mesbahul/ds-alert:latest
    volumes:
      - shared_data:/app/shared
      - ./logs:/app/logs
      - /etc/hostname:/host_hostname:ro
    networks:
      - eyes_edge_net
    deploy:
      labels:
        - com.ds.stack=ds_2026
        - com.ds.service=alert
      restart_policy:
        condition: any


  system_monitor:
    image: mesbahul/ds-system-monitor:latest
    volumes:
      - shared_data:/app/shared
      - ./logs:/app/logs
      - /etc/hostname:/host_hostname:ro
    networks:
      - eyes_edge_net
    # depends_on:
      # motion:
        # condition: service_healthy
    deploy:
      labels:
        - com.ds.stack=ds_2026
        - com.ds.service=system_monitor
      restart_policy:
        condition: any
  rebalancer:
    image: docker:27-cli
    configs:
      - source: rebalancer_script
        target: /rebalancer.sh
        mode: 0555
    environment:
      STACK_NAME: hello
      POLL_SECONDS: "15"
      COOLDOWN_SECONDS: "60"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["sh", "/rebalancer.sh"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 0
    

networks:
  eyes_edge_net:
    driver: overlay
    attachable: true

volumes:
  shared_data:
