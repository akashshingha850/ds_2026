services:
  motion:
    build:
      context: .
      dockerfile: motion/Dockerfile
    volumes:
      - shared_data:/app/shared
    networks:
      - monitor_net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 5557)); s.close()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  detection_coco:
    build:
      context: .
      dockerfile: detection_coco/Dockerfile
    volumes:
      - shared_data:/app/shared
    environment:
      - MOTION_HOST=motion
    networks:
      - monitor_net
    depends_on:
      motion:
        condition: service_healthy
    restart: unless-stopped

networks:
  monitor_net:
    driver: bridge

volumes:
  shared_data:
